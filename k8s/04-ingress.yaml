# Requirement 6a: exposure to the outside world over PORT 80 through a
# proxying/load-balancing solution - the NGINX ingress controller
# (enable it once with: minikube addons enable ingress).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempconverter
  namespace: tempconverter
spec:
  ingressClassName: nginx
  rules:
    - host: tempconverter.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tempconverter
                port:
                  number: 80
