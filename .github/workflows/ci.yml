name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: RootPass123
          MYSQL_DATABASE: tempconverter
          MYSQL_USER: tempuser
          MYSQL_PASSWORD: TempUserPass123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pRootPass123"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DB_USER: tempuser
      DB_PASS: TempUserPass123
      DB_HOST: 127.0.0.1
      DB_NAME: tempconverter
      STUDENT: Ivan
      COLLEGE: Algebra Bernays University
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit tests
        run: pytest tests/test_unit.py -v

      - name: Start application in background
        run: |
          python app.py &
          for i in $(seq 1 30); do
            curl -fs http://localhost:5000/ >/dev/null && break
            sleep 2
          done
          curl -fs http://localhost:5000/ >/dev/null

      - name: Integration tests
        run: pytest tests/test_integration.py -v
        env:
          APP_URL: http://localhost:5000

  build-and-push:
    name: Build image (and push on main)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ivan123895okr/tempconverter:latest
            ivan123895okr/tempconverter:${{ github.sha }}
